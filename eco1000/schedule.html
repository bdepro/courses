<!DOCTYPE html>
<!--
================================================================
  ECO 1000 — COURSE SCHEDULE
  Hosted: bdepro.github.io/courses/eco1000/schedule.html
  Sessions generated dynamically from config.js.
  To update dates/chapters: edit config.js only.
  To update slide links and examples: edit SESSIONS_CONTENT below.
================================================================
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ECO 1000 · Course Schedule</title>
  <link rel="stylesheet" href="https://bdepro.github.io/courses/shared/brand.css">
  <script src="config.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --crimson:    #73000a;
      --crimson-dk: #5a0008;
      --gold:       #b59a57;
      --gold-lt:    #d4b97a;
      --gold-link:  #7a5c1e;
      --cream:      #fcfaf7;
      --warm-gray:  #f7f4ef;
      --smoke:      #d3dfd3;
      --smoke-dark: #b8ccb8;
      --text:       #2e2e2e;
      --muted:      #6b6b6b;
      --disabled:   #c0c0c0;
      --white:      #ffffff;
      --shadow:     0 2px 16px rgba(115,0,10,0.08);
      --radius-pill: 6px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Roboto', Arial, sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }
    .header-inner { max-width: 860px; margin: 0 auto; }
    header { background: var(--crimson); border-bottom: 4px solid var(--gold); padding: 2rem 2rem 1.75rem; }
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      color: rgba(255,255,255,0.7); text-decoration: none;
      font-size: 0.78rem; font-weight: 500; letter-spacing: 0.05em;
      text-transform: uppercase; margin-bottom: 0.85rem; transition: color 0.15s;
    }
    .back-link:hover { color: var(--white); }
    header h1 { font-size: clamp(1.4rem,4vw,2rem); font-weight: 500; color: var(--white); letter-spacing: 0.02em; text-transform: uppercase; line-height: 1.2; }
    header p  { color: rgba(255,255,255,0.75); font-size: 0.88rem; margin-top: 0.4rem; font-weight: 300; font-style: italic; }

    .intro { font-size: 0.92rem; color: var(--muted); line-height: 1.65; margin-bottom: 1.75rem; }
    .intro a { color: var(--crimson); }

    .session-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }

    /* ── Cards ── */
    .session-card {
      border-radius: 14px; overflow: hidden;
      background: var(--warm-gray); transition: box-shadow 0.2s;
    }
    .session-card:hover { box-shadow: 0 4px 18px rgba(0,0,0,0.07); }

    /* ── Session type variants — left border only, no background tints ── */
    .session-card.type-checkin {
      border-left: 4px solid var(--crimson);
    }
    .session-card.type-viva {
      border-left: 4px solid var(--crimson);
    }
    .session-card.type-application {
      border-left: 4px solid var(--gold);
    }
    .session-card.type-break,
    .session-card.type-thanksgiving { opacity: 0.5; }

    /* Current session */
    .session-card.current {
      background: var(--smoke);
      outline: 2px solid var(--smoke-dark); outline-offset: -2px;
    }
    .session-card.type-checkin.current,
    .session-card.type-viva.current {
      border-left: 4px solid var(--crimson);
    }
    .session-card.type-application.current {
      border-left: 4px solid var(--gold);
    }

    /* ── Toggle ── */
    .session-toggle {
      width: 100%; background: none; border: none; cursor: pointer;
      padding: 0.9rem 1.1rem; display: flex; align-items: center; gap: 12px; text-align: left;
    }
    .session-toggle:focus-visible { outline: 3px solid var(--gold); outline-offset: -3px; border-radius: 14px; }

    /* ── Badge ── */
    .session-badge {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--gold); color: var(--white);
      font-weight: 700; font-size: 0.9rem;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .type-break .session-badge,
    .type-thanksgiving .session-badge { background: #aaa; }
    .type-checkin .session-badge  { background: var(--crimson); }
    .type-viva .session-badge     { background: var(--crimson); }
    .type-application .session-badge { background: var(--gold-link); }

    /* ── Header text ── */
    .session-header-text { flex: 1; display: flex; flex-direction: column; gap: 2px; }
    .session-label {
      font-size: 0.92rem; font-weight: 500; color: var(--crimson);
      display: flex; align-items: center; gap: 5px; flex-wrap: wrap;
    }
    .type-break .session-label,
    .type-thanksgiving .session-label { color: var(--muted); }
    .session-chapter { font-size: 0.78rem; font-weight: 400; color: var(--muted); line-height: 1.3; }

    /* ── Tags ── */
    .sess-tag {
      display: inline-block; font-size: 8px; font-weight: 700;
      letter-spacing: 0.07em; text-transform: uppercase;
      padding: 2px 6px; border-radius: 3px; flex-shrink: 0;
    }
    .tag-checkin { background: rgba(115,0,10,0.1);  color: #73000a; }
    .tag-viva    { background: rgba(115,0,10,0.1);  color: #73000a; }
    .tag-app     { background: rgba(181,154,87,0.2); color: var(--gold-link); }
    .tag-break   { background: rgba(0,0,0,0.07);     color: var(--muted); }
    .tag-current { background: var(--crimson);       color: var(--white); }
    .tag-mme     { background: rgba(181,154,87,0.15); color: var(--gold-link); }
    .tag-vote    { background: rgba(115,0,10,0.08);  color: #73000a; }

    /* ── Chevron ── */
    .chevron {
      margin-left: auto; width: 20px; height: 20px; color: var(--gold);
      transition: transform 0.25s ease; flex-shrink: 0;
      stroke: currentColor; fill: none; stroke-width: 2.5;
    }
    .session-toggle[aria-expanded="true"] .chevron { transform: rotate(180deg); }

    /* ── Body ── */
    .session-body { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.28s ease; }
    .session-body.open { grid-template-rows: 1fr; }
    .session-body-inner { overflow: hidden; padding: 0 1.1rem 0 66px; }
    .session-body.open .session-body-inner { padding-bottom: 1.1rem; }

    .topic { font-size: 0.86rem; font-weight: 300; font-style: italic; color: var(--text); line-height: 1.6; margin-bottom: 0.8rem; }

    /* ── Slides ── */
    .slides { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 0.85rem; }
    .slide-pill {
      display: inline-block; padding: 4px 14px; border-radius: 6px;
      font-size: 0.75rem; font-weight: 600; text-decoration: none;
      letter-spacing: 0.02em; transition: opacity 0.15s;
    }
    .slide-pill.active   { background: var(--crimson); color: var(--white); }
    .slide-pill.inactive { background: var(--disabled); color: var(--white); cursor: default; pointer-events: none; }

    /* ── Examples box ── */
    .examples-box { background: var(--white); border-left: 4px solid var(--gold); border-radius: 0 8px 8px 0; padding: 0.75rem 0.9rem; }
    .examples-box h4 { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.09em; color: var(--crimson); text-transform: uppercase; margin-bottom: 0.5rem; }
    .examples-box ul { list-style: none; display: flex; flex-direction: column; gap: 5px; }
    .examples-box a { color: var(--gold-link); text-decoration: none; font-size: 0.85rem; font-weight: 500; transition: color 0.15s; }
    .examples-box a:hover { color: var(--crimson); }
    .examples-box .disabled-link { color: var(--disabled); font-size: 0.85rem; font-weight: 500; }

    /* ── Info boxes ── */
    .info-box {
      border-left: 4px solid var(--crimson); border-radius: 0 8px 8px 0;
      padding: 0.75rem 0.9rem; margin-bottom: 0.75rem;
      font-size: 0.85rem; line-height: 1.55;
    }
    .info-box.ci-box   { background: rgba(115,0,10,0.04);  border-left-color: var(--crimson); }
    .info-box.app-box  { background: rgba(181,154,87,0.08); border-left-color: var(--gold); }
    .info-box.viva-box { background: rgba(115,0,10,0.04);  border-left-color: var(--crimson); }
    .info-box strong   { color: var(--crimson); font-weight: 600; }
    .info-box.app-box strong  { color: var(--gold-link); }
    .info-box.viva-box strong { color: var(--crimson); }
    .info-box .sub { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }

    footer { text-align: center; padding: 1.5rem; font-size: 0.78rem; color: var(--muted); border-top: 1px solid #e8e4dd; }

    @media (max-width: 540px) {
      .session-body-inner { padding-left: 1.1rem; }
      .session-badge { width: 36px; height: 36px; font-size: 0.82rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="back-link" id="backLink" href="#" target="_self">
      <svg viewBox="0 0 24 24" fill="none" style="width:14px;height:14px;stroke:currentColor;stroke-width:2.5"><polyline points="15 18 9 12 15 6"/></svg>

    </a>

<main>

<footer id="pageFooter"></footer>

<script>
// ── Wire header ──
document.getElementById('backLink').href        = PAGES.home;
document.getElementById('pageTitle').textContent = COURSE.title;
document.getElementById('pageMeta').textContent  = `${COURSE.code} · Elon University · ${COURSE.semester}`;
document.getElementById('pageFooter').textContent = `ECO 1000 · Elon University · ${COURSE.semester} · ${INSTRUCTOR.name}`;
document.getElementById('introText').innerHTML   =
  `The semester is organized by session with three class meetings per session (M,W,F). ` +
  `Each session builds on economic concepts through puzzles, check-ins, and real-world examples. ` +
  `See the <a href="${PAGES.syllabus}">course syllabus</a> for complete details.`;

// ── Helpers ──
function chLabel(session) {
  if (!session.chapter || session.chapter === 'application') return null;
  if (session.chapter === 'ch8_ch16') {
    const a = CHAPTERS.core.find(c => c.key === 'ch8');
    const b = CHAPTERS.core.find(c => c.key === 'ch16');
    return a && b ? `${a.num} / ${b.num}` : null;
  }
  const ch = CHAPTERS.core.find(c => c.key === session.chapter);
  return ch ? ch.num : null;
}

function chTitle(session) {
  if (!session.chapter) return null;
  if (session.chapter === 'application') return 'Student-selected application questions';
  if (session.chapter === 'ch8_ch16') {
    const a = CHAPTERS.core.find(c => c.key === 'ch8');
    const b = CHAPTERS.core.find(c => c.key === 'ch16');
    return a && b ? `${a.title} / ${b.title}` : null;
  }
  const ch = CHAPTERS.core.find(c => c.key === session.chapter);
  return ch ? ch.title : null;
}

function sessType(s) {
  if (s.break && s.label.includes('Thanks')) return 'thanksgiving';
  if (s.break)   return 'break';
  if (s.viva)    return 'viva';
  if (s.chapter === 'application') return 'application';
  if (s.checkIn) return 'checkin';
  return 'content';
}

function renderSlides(num) {
  const c = SESSIONS_CONTENT[num];
  if (!c || !c.slides || !c.slides.length) return '';
  const pills = c.slides.map(s =>
    s.url
      ? `<a class="slide-pill active" href="${s.url}" target="_blank">${s.label}</a>`
      : `<span class="slide-pill inactive">${s.label}</span>`
  ).join('');
  return `<div class="slides">${pills}</div>`;
}

function renderExamples(num, heading) {
  const c = SESSIONS_CONTENT[num];
  if (!c || !c.examples || !c.examples.length) return '';
  const items = c.examples.map(e =>
    e.url
      ? `<li><a href="${e.url}" target="_blank">→ ${e.day}: ${e.label}</a></li>`
      : `<li><span class="disabled-link">→ ${e.day}: ${e.label}</span></li>`
  ).join('');
  return `<div class="examples-box"><h4>${heading || 'In-Class Examples'}</h4><ul>${items}</ul></div>`;
}

function bodyContent(session, type) {
  if (type === 'break' || type === 'thanksgiving') {
    return `<p class="topic" style="color:var(--muted)">${session.note || 'No class.'}</p>`;
  }
  if (type === 'checkin') {
    const ci = CHAPTERS.checkIns[session.checkIn];
    return `
      <div class="info-box ci-box">
        <strong>${session.checkInDay} — Check-In #${session.checkIn}</strong>
        <div class="sub">Covers: ${ci ? ci.label : 'TBA'} · Supply &amp; demand · 8 guideposts</div>
      </div>
      ${renderExamples(session.num, 'Resources')}
    `;
  }
  if (type === 'application') {
    const appChs = CHAPTERS.application.map(c => c.num).join(', ');
    return `
      <div class="info-box app-box">
        <strong>Student-selected questions</strong>
        <div class="sub">Reference chapters: ${appChs}</div>
      </div>
      ${renderExamples(session.num, 'Class Sessions')}
    `;
  }
  if (type === 'viva') {
    return `
      <div class="info-box viva-box">
        <strong>Viva Week — Mon &amp; Wed</strong>
        <div class="sub">12-minute individual conversations. See sign-up for your slot.</div>
      </div>
      <div class="info-box ci-box" style="margin-top:0.5rem">
        <strong>Friday Dec 4 — Check-In #4</strong>
        <div class="sub">Comprehensive · Ch. 18 + application block · S&amp;D · Guideposts · CI #4 replaces lowest CI #1–3 if higher.</div>
      </div>
      <div class="info-box viva-box" style="margin-top:0.5rem">
        <strong>Makeup viva: ${SCHEDULE.makeupViva.dates}</strong>
        <div class="sub">${SCHEDULE.makeupViva.note}</div>
      </div>
      ${renderExamples(session.num, 'Schedule')}
    `;
  }
  // content
  const title = chTitle(session);
  return `
    ${title ? `<p class="topic">${title}</p>` : ''}
    ${renderSlides(session.num)}
    ${renderExamples(session.num, 'In-Class Examples')}
  `;
}

// ── Render sessions ──
const list = document.getElementById('sessionList');

SCHEDULE.sessions.forEach((session, idx) => {
  const type = sessType(session);
  const cl   = chLabel(session);
  const ct   = chTitle(session);

  // Badge
  const badge = type === 'viva' ? '✓' : String(session.num);

  // Type tag
  const tags = [
    session.checkIn    ? `<span class="sess-tag tag-checkin">CI #${session.checkIn}</span>` : '',
    type === 'viva'    ? `<span class="sess-tag tag-viva">Viva + CI #4</span>`              : '',
    type === 'application' ? `<span class="sess-tag tag-app">Application</span>`            : '',
    (type === 'break' || type === 'thanksgiving') ? `<span class="sess-tag tag-break">Break</span>` : '',
    session.mmeFF      ? `<span class="sess-tag tag-mme">MME + FF</span>`                   : '',
    session.vote       ? `<span class="sess-tag tag-vote">Vote</span>`                      : '',
  ].join('');

  // Chapter subtitle
  let chSub = '';
  if (cl && type === 'content') {
    const shortTitle = ct ? ct.split(':')[0].split('/')[0].trim() : '';
    chSub = `<div class="session-chapter">${cl}${shortTitle ? ' · ' + shortTitle : ''}</div>`;
  }
  if (type === 'application') chSub = `<div class="session-chapter">Ch. 5, 6, 23, 26, 28 — reference</div>`;
  if (type === 'checkin') {
    const ci = CHAPTERS.checkIns[session.checkIn];
    chSub = `<div class="session-chapter">Covers: ${ci ? ci.label : 'TBA'}</div>`;
  }
  if (type === 'viva') chSub = `<div class="session-chapter">Mon &amp; Wed: viva · Fri: Check-In #4</div>`;

  const li = document.createElement('li');
  li.className = `session-card type-${type}`;
  li.id        = `session-${session.num}`;
  li.innerHTML = `
    <button class="session-toggle" aria-expanded="false" data-session="${session.num}">
      <div class="session-badge">${badge}</div>
      <div class="session-header-text">
        <div class="session-label">
          ${session.label}
          <span style="font-weight:300;font-size:.88em;color:var(--muted)">(${session.dates})</span>
          ${tags}
        </div>
        ${chSub}
      </div>
      <svg class="chevron" viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    <div class="session-body" id="body-${session.num}">
      <div class="session-body-inner">${bodyContent(session, type)}</div>
    </div>
  `;
  list.appendChild(li);
});

// ── Auto-highlighting ──
(function applyHighlighting() {
  const today  = new Date(); today.setHours(0,0,0,0);
  const starts = SCHEDULE.sessionStarts;
  let cur = -1;
  for (let i = 0; i < starts.length - 1; i++) {
    if (today >= starts[i] && today < starts[i+1]) { cur = i; break; }
  }
  SCHEDULE.sessions.forEach((session, idx) => {
    if (SCHEDULE.breakSessions.includes(idx)) return;
    const card   = document.getElementById(`session-${session.num}`);
    const toggle = card && card.querySelector('.session-toggle');
    const body   = document.getElementById(`body-${session.num}`);
    const label  = card && card.querySelector('.session-label');
    if (!card) return;
    card.classList.remove('current');
    if (idx === cur) {
      card.classList.add('current');
      if (toggle) toggle.setAttribute('aria-expanded', 'true');
      if (body)   body.classList.add('open');
      if (label && !label.querySelector('.tag-current')) {
        const t = document.createElement('span');
        t.className = 'sess-tag tag-current'; t.textContent = 'Current';
        label.appendChild(t);
      }
    }
  });
})();

// ── Accordion ──
document.getElementById('sessionList').addEventListener('click', e => {
  const btn = e.target.closest('.session-toggle');
  if (!btn) return;
  const exp  = btn.getAttribute('aria-expanded') === 'true';
  const body = document.getElementById(`body-${btn.dataset.session}`);
  btn.setAttribute('aria-expanded', String(!exp));
  if (body) body.classList.toggle('open', !exp);
});

lucide.createIcons();
</script>
</body>
</html>
