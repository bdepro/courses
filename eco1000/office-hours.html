<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Office Hours · ECO 1000</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="config.js"></script>
  <style>
    :root {
      --crimson:    #73000a;
      --crimson-dk: #5a0008;
      --gold:       #b59a57;
      --gold-link:  #7a5c1e;
      --cream:      #fcfaf7;
      --warm-gray:  #f7f4ef;
      --text:       #2e2e2e;
      --muted:      #6b6b6b;
      --white:      #ffffff;
      --shadow:     0 2px 16px rgba(115,0,10,0.07);
      --radius:     16px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Roboto', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }
    header { background: var(--crimson); border-bottom: 4px solid var(--gold); padding: 2rem 2rem 1.75rem; }
    .header-inner { max-width: 860px; margin: 0 auto; }
    .back-link { display: inline-flex; align-items: center; gap: 6px; color: rgba(255,255,255,0.65); text-decoration: none; font-size: 0.72rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 1rem; transition: color 0.15s; }
    .back-link:hover { color: var(--white); }
    .back-link svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2.5; }
    .page-eyebrow { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.75); margin-bottom: 0.4rem; }
    header h1 { font-size: clamp(1.6rem, 5vw, 2.2rem); font-weight: 700; color: var(--white); line-height: 1.2; }
    main { max-width: 860px; margin: 0 auto; padding: 2.5rem 1.5rem 5rem; }
    .section-label { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin: 0 0 1rem; }
    .info-card { background: var(--white); border-radius: var(--radius); box-shadow: var(--shadow); border: 1px solid rgba(181,154,87,0.15); overflow: hidden; margin-bottom: 2rem; }
    .info-row { display: grid; grid-template-columns: 140px 1fr; padding: 1rem 1.4rem; border-bottom: 1px solid rgba(181,154,87,0.1); align-items: start; }
    .info-row:last-child { border-bottom: none; }
    .row-label { font-size: 0.72rem; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; padding-top: 0.1rem; }
    .row-value { font-size: 0.92rem; color: var(--text); line-height: 1.5; }
    .row-value a { color: var(--gold-link); text-decoration: none; font-weight: 500; }
    .row-value a:hover { color: var(--crimson); }
    .zoom-btn { display: inline-flex; align-items: center; gap: 8px; background: var(--crimson); color: var(--white) !important; text-decoration: none; font-size: 0.82rem; font-weight: 600; padding: 0.55rem 1.1rem; border-radius: 8px; margin-top: 0.5rem; }
    .zoom-btn:hover { background: var(--crimson-dk) !important; }
    .zoom-btn svg { width: 14px; height: 14px; stroke: var(--white); fill: none; stroke-width: 2; }
    footer { text-align: center; padding: 1.5rem 1rem; font-size: 0.75rem; color: rgba(107,107,107,0.6); border-top: 1px solid rgba(181,154,87,0.15); }
    @media (max-width: 600px) {
      header { padding: 1.5rem 1.25rem; }
      main { padding: 1.75rem 1rem 4rem; }
      .info-row { grid-template-columns: 1fr; gap: 0.2rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="back-link" id="backLink" href="#">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      All Weeks
    </a>
    <p class="page-eyebrow" id="pageEyebrow"></p>
    <h1>Office Hours</h1>
  </div>
</header>

<main>
  <p class="section-label">When &amp; Where</p>
  <div class="info-card">
    <div class="info-row">
      <span class="row-label">Hours</span>
      <span class="row-value" id="oh-hours"></span>
    </div>
    <div class="info-row">
      <span class="row-label">In Person</span>
      <span class="row-value" id="oh-office"></span>
    </div>
    <div class="info-row">
      <span class="row-label">Zoom</span>
      <span class="row-value">
        <span id="oh-zoom-display"></span><br>
        <a class="zoom-btn" href="#" id="oh-zoom-link" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24"><path d="M15 10l4.553-2.069A1 1 0 0 1 21 8.82v6.36a1 1 0 0 1-1.447.89L15 14"/><rect x="3" y="6" width="12" height="12" rx="2"/></svg>
          Join Zoom Room
        </a>
      </span>
    </div>
  </div>

  <p class="section-label">Contact</p>
  <div class="info-card">
    <div class="info-row">
      <span class="row-label">Email</span>
      <span class="row-value"><a id="oh-email" href="#"></a></span>
    </div>
    <div class="info-row">
      <span class="row-label">Phone</span>
      <span class="row-value" id="oh-phone"></span>
    </div>
  </div>
</main>

<footer>
  <span id="footerText"></span>
</footer>

<script>
document.getElementById('backLink').href          = PAGES.checklist;
document.getElementById('pageEyebrow').textContent = `${COURSE.code} · ${COURSE.semester}`;
document.getElementById('footerText').textContent  = `${COURSE.code} · ${COURSE.title} · ${COURSE.semester}`;

document.getElementById('oh-hours').textContent       = INSTRUCTOR.officeHours;
document.getElementById('oh-office').textContent      = INSTRUCTOR.office;
document.getElementById('oh-zoom-display').textContent = INSTRUCTOR.zoomDisplay;
document.getElementById('oh-zoom-link').href          = INSTRUCTOR.zoomUrl;
document.getElementById('oh-email').textContent       = INSTRUCTOR.email;
document.getElementById('oh-email').href              = `mailto:${INSTRUCTOR.email}`;
document.getElementById('oh-phone').textContent       = INSTRUCTOR.phone;
</script>
</body>
</html>
