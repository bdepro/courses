<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weekly Checklists · ECO 1000</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="config.js"></script>
  <style>
    :root {
      --crimson: #73000a; --gold: #b59a57; --gold-lt: #d4b97a; --gold-link: #7a5c1e;
      --cream: #fcfaf7; --warm-gray: #f7f4ef;
      --text: #2e2e2e; --muted: #6b6b6b; --white: #ffffff;
      --shadow: 0 2px 14px rgba(115,0,10,0.07); --radius: 14px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Roboto', Arial, sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }
    header { background: var(--crimson); border-bottom: 4px solid var(--gold); padding: 2rem; }
    .header-inner { max-width: 860px; margin: 0 auto; }
    .back-link { display: inline-flex; align-items: center; gap: 6px; color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.75rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.85rem; transition: color 0.15s; }
    .back-link:hover { color: var(--white); }
    .back-link svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.5; }
    .course-tag { font-size: 0.7rem; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase; color: var(--gold-lt); margin-bottom: 0.3rem; }
    header h1 { font-size: clamp(1.4rem, 4vw, 2rem); font-weight: 500; color: var(--white); }

    main { max-width: 860px; margin: 0 auto; padding: 2.5rem 1.5rem 4rem; }
    .section-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin-bottom: 1rem; }

    .week-list { display: flex; flex-direction: column; gap: 1rem; margin-bottom: 2.5rem; }

    .week-card {
      background: var(--white); border-radius: var(--radius);
      box-shadow: var(--shadow); border: 1px solid rgba(181,154,87,0.15);
      text-decoration: none; color: inherit;
      display: flex; align-items: stretch; overflow: hidden;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .week-card:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(115,0,10,0.13); }

    .week-stripe {
      background: var(--crimson); width: 6px; flex-shrink: 0;
    }
    .week-body { padding: 1.3rem 1.4rem; flex: 1; }
    .week-num { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.3rem; }
    .week-title { font-size: 1rem; font-weight: 600; color: var(--crimson); line-height: 1.3; margin-bottom: 0.3rem; }
    .week-dates { font-size: 0.8rem; color: var(--muted); }
    .week-arrow { display: flex; align-items: center; padding: 0 1.25rem; color: var(--gold-link); }
    .week-arrow svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; }

    .divider { height: 1px; background: rgba(181,154,87,0.2); margin: 2rem 0; }

    .office-card {
      background: var(--white); border-radius: var(--radius);
      box-shadow: var(--shadow); border: 1px solid rgba(181,154,87,0.15);
      padding: 1.4rem 1.5rem; display: flex; align-items: center; gap: 1.1rem;
      text-decoration: none; color: inherit;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .office-card:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(115,0,10,0.13); }
    .oc-icon { width: 44px; height: 44px; border-radius: 10px; background: var(--crimson); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .oc-icon svg { width: 22px; height: 22px; stroke: var(--white); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .oc-body { flex: 1; }
    .oc-title { font-size: 1rem; font-weight: 600; color: var(--crimson); }
    .oc-desc { font-size: 0.82rem; color: var(--muted); margin-top: 0.25rem; line-height: 1.5; }

    @media (max-width: 600px) {
      header { padding: 1.5rem 1.25rem; }
      main { padding: 1.75rem 1rem 3rem; }
    }
  </style>
</head>
<body>
<header>
  <div class="header-inner">
    <a class="back-link" id="backLink" href="#">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Course Home
    </a>
    <p class="course-tag" id="courseTag"></p>
    <h1>Weekly Checklists &amp; Office Hours</h1>
  </div>
</header>

<main>
  <p class="section-label">Weekly Checklists</p>
  <div class="week-list" id="weekList"></div>

  <div class="divider"></div>

  <p class="section-label" style="margin-bottom:1rem">One-on-One Support</p>
  <a class="office-card" id="officeLink" href="#" target="_blank" rel="noopener">
    <div class="oc-icon">
      <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
    </div>
    <div class="oc-body">
      <div class="oc-title">Meet with Me: Office Hours &amp; One-on-One Support</div>
      <div class="oc-desc">Schedule a one-on-one appointment or find drop-in office hours times. No question is too small.</div>
    </div>
    <svg style="width:18px;height:18px;stroke:var(--muted);fill:none;stroke-width:2;flex-shrink:0" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
  </a>
</main>

<script>
document.getElementById('backLink').href = PAGES.home;
document.getElementById('courseTag').textContent = `${COURSE.courseCode} · ${COURSE.semester}`;
// UPDATE these Moodle page IDs each semester after course copy
document.getElementById('officeLink').href = PAGES.office-hours;

// Weeks built from config — no hardcoded content needed
const WEEKS = [
  { num: "Week 1", title: "How Markets Work",                           url: `${COURSE.baseUrl}/checklist/week1.html` },
  { num: "Week 2", title: "How Economies Perform and Grow",             url: `${COURSE.baseUrl}/checklist/week2.html` },
  { num: "Week 3", title: "Why Outcomes Differ and What Policy Can Do", url: `${COURSE.baseUrl}/checklist/week3.html` },
];

const list = document.getElementById('weekList');
WEEKS.forEach((w, i) => {
  const weekData = COURSE.weeks[i];
  const a = document.createElement('a');
  a.className = 'week-card';
  a.href   = w.url;
  a.target = '_self';
  a.rel    = 'noopener';
  a.innerHTML = `
    <div class="week-stripe"></div>
    <div class="week-body">
      <div class="week-num">${w.num}</div>
      <div class="week-title">${w.title}</div>
      <div class="week-dates">${weekData ? weekData.dates + ' · Due ' + weekData.due : ''}</div>
    </div>
    <div class="week-arrow">
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </div>
  `;
  list.appendChild(a);
});
</script>
</body>
</html>
