<!DOCTYPE html>
<!--
================================================================
  ECO1000_Cengage — COURSE HOME PAGE
  Hosted: bdepro.github.io/courses/ECO1000_Cengage/index.html
  Search UPDATE to find spots that need editing each semester.
================================================================
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ECO 1000 · Principles of Economics</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="config.js"></script>
  <style>
    :root {
      --crimson:    #73000a;
      --crimson-dk: #5a0008;
      --gold:       #b59a57;
      --gold-lt:    #d4b97a;
      --gold-link:  #7a5c1e;
      --cream:      #fcfaf7;
      --warm-gray:  #f7f4ef;
      --text:       #2e2e2e;
      --muted:      #6b6b6b;
      --disabled:   #c0c0c0;
      --white:      #ffffff;
      --shadow:     0 2px 16px rgba(115,0,10,0.08);
      --shadow-hover: 0 8px 32px rgba(115,0,10,0.16);
      --radius:     16px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Roboto', Arial, sans-serif;
      background: var(--cream);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--crimson);
      border-bottom: 4px solid var(--gold);
      padding: 2.5rem 2rem 2rem;
    }
    .header-inner {
      max-width: 960px;
      margin: 0 auto;
    }
    .course-code {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--gold-lt);
      margin-bottom: 0.4rem;
    }
    header h1 {
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      font-weight: 500;
      color: var(--white);
      letter-spacing: 0.02em;
      line-height: 1.2;
    }
    .header-meta {
      margin-top: 0.5rem;
      font-size: 0.88rem;
      color: rgba(255,255,255,0.7);
      font-weight: 300;
    }

    /* ── Intro band ── */
    .intro {
      background: var(--warm-gray);
      border-bottom: 1px solid rgba(181,154,87,0.2);
      padding: 1.25rem 2rem;
    }
    .intro-inner {
      max-width: 960px;
      margin: 0 auto;
      font-size: 0.92rem;
      color: var(--muted);
      line-height: 1.6;
    }
    .intro-inner strong { color: var(--crimson); }

    /* ── Card grid ── */
    main {
      max-width: 960px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    .section-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.25rem;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.25rem;
      margin-bottom: 2.5rem;
    }

    .card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid rgba(181,154,87,0.15);
      padding: 1.6rem 1.5rem 1.4rem;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      transition: transform 0.18s ease, box-shadow 0.18s ease;
      cursor: pointer;
    }
    .card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow-hover);
    }
    .card.disabled {
      opacity: 0.55;
      cursor: default;
      pointer-events: none;
    }

    .card-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      background: var(--crimson);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.25rem;
      flex-shrink: 0;
    }
    .card.disabled .card-icon { background: var(--disabled); }
    .card-icon svg {
      width: 22px;
      height: 22px;
      stroke: var(--white);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--crimson);
      line-height: 1.3;
    }
    .card.disabled .card-title { color: var(--muted); }

    .card-desc {
      font-size: 0.83rem;
      color: var(--muted);
      line-height: 1.55;
      flex: 1;
    }

    .card-badge {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      margin-top: 0.25rem;
      align-self: flex-start;
    }
    .badge-grade    { background: rgba(115,0,10,0.08); color: var(--crimson); }
    .badge-resource { background: rgba(181,154,87,0.15); color: var(--gold-link); }
    .badge-soon     { background: rgba(0,0,0,0.07); color: var(--muted); }

    .card-arrow {
      margin-top: 0.5rem;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--gold-link);
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .card-arrow svg {
      width: 14px; height: 14px;
      stroke: currentColor; fill: none;
      stroke-width: 2.5;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 2rem 1rem;
      font-size: 0.78rem;
      color: var(--disabled);
      border-top: 1px solid rgba(181,154,87,0.15);
    }
    footer a { color: var(--gold-link); text-decoration: none; }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      header { padding: 1.75rem 1.25rem 1.5rem; }
      main   { padding: 1.75rem 1rem 3rem; }
      .card-grid { grid-template-columns: 1fr; gap: 1rem; }
      .card { padding: 1.4rem 1.25rem 1.2rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <p class="course-code" id="courseCode"></p>
    <h1 id="courseTitle"></h1>
    <p class="header-meta" id="headerMeta"></p>
  </div>
</header>

<div class="intro">
  <div class="intro-inner">
    <strong>Welcome.</strong> Use the cards below to navigate your course.
    Each section opens directly — no hunting through menus.
    All Cengage and MindTap resources open in a new tab and require your Cengage login.
  </div>
</div>

<main>
  <p class="section-label">Course Sections</p>
  <div class="card-grid" id="cardGrid"></div>
</main>

<footer>
  <span id="footerText"></span> &nbsp;·&nbsp;
  <a href="https://www.elon.edu" target="_blank">Elon University</a>
</footer>

<script>
// Card definitions — icons use inline SVG path data (Lucide style)
const CARDS = [
  {
    id: "syllabus",
    title: "Course Syllabus, AI Policy & Cengage Access",
    desc: "Start here. Find the syllabus, AI use policy, and step-by-step instructions for purchasing your Cengage materials.",
    badge: "Resource",
    badgeClass: "badge-resource",
    icon: `<svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>`,
    url: () => PAGES.syllabus,
    enabled: true,
  },
  {
    id: "checklists",
    title: "Weekly Checklists & Office Hours",
    desc: "What to do, why it matters, and when it's due — week by week. Plus how to schedule one-on-one support.",
    badge: "Resource",
    badgeClass: "badge-resource",
    icon: `<svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>`,
    url: () => PAGES.checklists,
    enabled: true,
  },
  {
    id: "cengage",
    title: "Cengage: E-Book, MindTap & Chapter Videos",
    desc: "Access your digital textbook, chapter lecture videos, and all MindTap study resources — organized by chapter.",
    badge: "Resource",
    badgeClass: "badge-resource",
    icon: `<svg viewBox="0 0 24 24"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>`,
    url: () => PAGES.cengage,
    enabled: true,
  },
  {
    id: "mme",
    title: "Monday Morning Economist",
    desc: "Weekly current-events readings with guided annotation. Uses real-world stories to connect economics to your life. (Coming soon — Perusall setup in progress.)",
    badge: "Coming Soon",
    badgeClass: "badge-soon",
    icon: `<svg viewBox="0 0 24 24"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v2"/><path d="M2 13h10"/><path d="M9 18H2"/><path d="M2 8h6"/></svg>`,
    url: () => PAGES.mme,
    enabled: false,
  },
  {
    id: "puzzles",
    title: "Economic Puzzles",
    desc: "Chapter-by-chapter critical thinking challenges. 15% of your course grade — one puzzle per chapter covered.",
    badge: "15% of Grade",
    badgeClass: "badge-grade",
    icon: `<svg viewBox="0 0 24 24"><path d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z"/><line x1="16" y1="8" x2="2" y2="22"/><line x1="17.5" y1="15" x2="9" y2="15"/></svg>`,
    url: () => PAGES.puzzles,
    enabled: true,
  },
  {
    id: "badges",
    title: "Achievement Badges",
    desc: "Earn a badge for each chapter by completing the MindTap mastery assessment. 12 badges × 5% each = 60% of your course grade.",
    badge: "60% of Grade",
    badgeClass: "badge-grade",
    icon: `<svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="6"/><path d="M15.477 12.89L17 22l-5-3-5 3 1.523-9.11"/></svg>`,
    url: () => PAGES.badges,
    enabled: true,
  },
  {
    id: "friday",
    title: "Friday Focus: Critical Thinking",
    desc: "Two written assignments that ask you to apply economic reasoning to real-world scenarios. 15% of your course grade.",
    badge: "15% of Grade",
    badgeClass: "badge-grade",
    icon: `<svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>`,
    url: () => PAGES.friday,
    enabled: true,
  },
];

// Build header from config
document.getElementById('courseCode').textContent   = `${COURSE.courseCode} · ${COURSE.semester}`;
document.getElementById('courseTitle').textContent  = COURSE.courseTitle;
document.getElementById('headerMeta').textContent   = `Elon University${COURSE.instructor ? ' · ' + COURSE.instructor : ''}`;
document.getElementById('footerText').textContent   = `${COURSE.courseCode} · ${COURSE.courseTitle} · ${COURSE.semester}`;

// Build cards
const grid = document.getElementById('cardGrid');
CARDS.forEach(card => {
  const a = document.createElement('a');
  a.className = 'card' + (card.enabled ? '' : ' disabled');
  a.href      = card.enabled ? card.url() : '#';
  if (card.enabled) a.target = '_self';

  a.innerHTML = `
    <div class="card-icon">${card.icon}</div>
    <div class="card-title">${card.title}</div>
    <div class="card-desc">${card.desc}</div>
    <span class="card-badge ${card.badgeClass}">${card.badge}</span>
    ${card.enabled ? `<div class="card-arrow">
      Open section
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </div>` : ''}
  `;
  grid.appendChild(a);
});
</script>
</body>
</html>
