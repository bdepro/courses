<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monday Morning Economist · ECO 1000</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="config.js"></script>
  <style>
    :root {
      --crimson: #73000a; --gold: #b59a57; --gold-lt: #d4b97a; --gold-link: #7a5c1e;
      --cream: #fcfaf7; --warm-gray: #f7f4ef;
      --text: #2e2e2e; --muted: #6b6b6b; --white: #ffffff;
      --shadow: 0 2px 14px rgba(115,0,10,0.07); --radius: 14px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Roboto', Arial, sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }
    header { background: var(--crimson); border-bottom: 4px solid var(--gold); padding: 2rem; }
    .header-inner { max-width: 860px; margin: 0 auto; }
    .back-link { display: inline-flex; align-items: center; gap: 6px; color: rgba(255,255,255,0.7); text-decoration: none; font-size: 0.75rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 0.85rem; transition: color 0.15s; }
    .back-link:hover { color: var(--white); }
    .back-link svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.5; }
    .course-tag { font-size: 0.7rem; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase; color: var(--gold-lt); margin-bottom: 0.3rem; }
    header h1 { font-size: clamp(1.4rem, 4vw, 2rem); font-weight: 500; color: var(--white); }

    main { max-width: 860px; margin: 0 auto; padding: 3rem 1.5rem 4rem; }

    .coming-soon-box {
      background: var(--white); border-radius: var(--radius);
      box-shadow: var(--shadow); border: 1px solid rgba(181,154,87,0.2);
      padding: 3rem 2rem; text-align: center;
    }
    .cs-icon { font-size: 3rem; margin-bottom: 1rem; }
    .cs-title { font-size: 1.3rem; font-weight: 600; color: var(--crimson); margin-bottom: 0.75rem; }
    .cs-body { font-size: 0.9rem; color: var(--muted); line-height: 1.65; max-width: 480px; margin: 0 auto 1.5rem; }
    .cs-back { display: inline-flex; align-items: center; gap: 6px; background: var(--crimson); color: var(--white); text-decoration: none; padding: 0.65rem 1.4rem; border-radius: 8px; font-size: 0.85rem; font-weight: 500; transition: background 0.15s; }
    .cs-back:hover { background: #5a0008; }
    .cs-back svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2.5; }

    /* When MME is enabled, show article list */
    .article-list { display: flex; flex-direction: column; gap: 0.9rem; }
    .article-card {
      background: var(--white); border-radius: var(--radius);
      box-shadow: var(--shadow); border: 1px solid rgba(181,154,87,0.15);
      padding: 1.3rem 1.4rem; display: flex; gap: 1rem; align-items: center;
      text-decoration: none; color: inherit;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .article-card:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(115,0,10,0.13); }
    .art-num { width: 36px; height: 36px; border-radius: 8px; background: var(--crimson); display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: 700; color: var(--white); flex-shrink: 0; }
    .art-title { flex: 1; font-size: 0.92rem; font-weight: 500; color: var(--text); line-height: 1.4; }
    .art-arrow svg { width: 14px; height: 14px; stroke: var(--muted); fill: none; stroke-width: 2; }

    @media (max-width: 600px) {
      header { padding: 1.5rem 1.25rem; }
      main { padding: 2rem 1rem 3rem; }
      .coming-soon-box { padding: 2.5rem 1.25rem; }
    }
  </style>
</head>
<body>
<header>
  <div class="header-inner">
    <a class="back-link" id="backLink" href="#">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      Course Home
    </a>
    <p class="course-tag" id="courseTag"></p>
    <h1>Monday Morning Economist</h1>
  </div>
</header>

<main id="main"></main>

<script>
document.getElementById('backLink').href = PAGES.home;
document.getElementById('courseTag').textContent = `${COURSE.courseCode} · ${COURSE.semester}`;

const main = document.getElementById('main');

if (!MME.enabled) {
  // Show coming soon state
  main.innerHTML = `
    <div class="coming-soon-box">
      <div class="cs-icon">📰</div>
      <div class="cs-title">Coming Soon</div>
      <div class="cs-body">
        The Monday Morning Economist readings are being set up in Perusall
        for this semester. Check back soon — your instructor will announce
        when this section is ready in the course announcements.
      </div>
      <a class="cs-back" href="${PAGES.home}">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        Back to Course Home
      </a>
    </div>
  `;
} else {
  // Show live article list
  const grade = document.createElement('div');
  grade.innerHTML = `<p style="font-size:0.82rem;color:var(--muted);line-height:1.6;margin-bottom:2rem;">
    Each week you'll read a short article in Perusall and annotate it with your questions and reactions.
    Current events, explained through economics. 10% of your course grade.
  </p>`;
  main.appendChild(grade);

  const label = document.createElement('p');
  label.className = 'section-label';
  label.style.marginBottom = '1rem';
  label.textContent = 'Weekly Readings — Opens in Perusall';
  main.appendChild(label);

  const list = document.createElement('div');
  list.className = 'article-list';
  MME.articles.forEach(a => {
    const card = document.createElement('a');
    card.className = 'article-card';
    card.href   = a.url || MME.perusallBase;
    card.target = '_blank';
    card.rel    = 'noopener';
    card.innerHTML = `
      <div class="art-num">${a.id}</div>
      <div class="art-title">${a.title}</div>
      <div class="art-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
    `;
    list.appendChild(card);
  });
  main.appendChild(list);
}
</script>
</body>
</html>
